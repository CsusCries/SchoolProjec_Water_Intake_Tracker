<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydration Calendar</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>📅 Hydration Calendar</h1>
  <p>Track your water history</p>
</header>

<div class="nav">
  <a href="./index.html">⬅ Back to Tracker</a>
</div>

<section class="calendar">
  <div class="calendar-header">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="monthYear"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="calendar-grid" id="calendar"></div>
</section>

<section class="history">
  <h3>Hydration History</h3>
  <div id="selectedDate">Select a date</div>

  <div class="history-container">
    <div class="time-block" id="morningBlock">
      <h4>🌅 Morning</h4>
      <ul id="morningLogs"></ul>
    </div>
    <div class="time-block" id="noonBlock">
      <h4>🌞 Noon</h4>
      <ul id="noonLogs"></ul>
    </div>
    <div class="time-block" id="eveningBlock">
      <h4>🌙 Evening</h4>
      <ul id="eveningLogs"></ul>
    </div>
  </div>

  <p id="dailyTotal"></p>
</section>

<script src="js/calendar.js"></script>
</body>
</html>
